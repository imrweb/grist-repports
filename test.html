<!DOCTYPE html>
<html>
<head>
  <!-- Importation de l'API Grist -->
  <script src="https://getgrist.com"></script>
</head>
<body>
  <div id="container">
    <h1>Fiche Client</h1>
    <p>Nomm : <span id="nom">...</span></p>
    <p>Ville : <span id="ville">...</span></p>
  </div>

  <script>
    // Initialisation du widget
    grist.ready();

    // Fonction appelée à chaque changement de sélection dans Grist
    grist.onRecord(function(record) {
      document.getElementById('nom').innerText = record.periode || "N/A";
      document.getElementById('ville').innerText = record.ref || "N/A";
    });
  </script>
</body>
</html>
